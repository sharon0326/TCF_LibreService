<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCF Question Bank Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="sectionHero">
        <div>
          <a class="backLink" href="./index.html">← Back to sections</a>
          <p id="sectionEyebrow" class="eyebrow">TCF Canada</p>
          <h1 id="sectionTitle" class="title">Loading…</h1>
          <p id="sectionSubtitle" class="subtitle"></p>
        </div>
      </header>

      <section class="controls" aria-label="Filters">
        <div class="control">
          <label for="yearFilter">Year</label>
          <select id="yearFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="control">
          <label for="monthFilter">Month</label>
          <select id="monthFilter">
            <option value="">All</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
          </select>
        </div>

        <div id="categoryControl" class="control">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All</option>
          </select>
        </div>

        <div class="control control--wide">
          <label for="titleFilter">Keyword</label>
          <input id="titleFilter" type="text" placeholder="Search prompt or title..." />
        </div>

        <div class="control control--buttons">
          <button id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <section class="meta" aria-label="Meta">
        <div id="status">Loading…</div>
      </section>

      <section class="tableWrap">
        <table class="table" aria-label="Results">
          <thead>
            <tr>
              <th style="width: 90px">Year</th>
              <th style="width: 80px">Month</th>
              <th style="width: 130px">Combinaison</th>
              <th>Title</th>
              <th id="categoryHeader" style="width: 170px">Category</th>
              <th style="width: 110px">Details</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
